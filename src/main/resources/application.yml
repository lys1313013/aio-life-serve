server:
  port: 45678
  servlet:
    context-path: /api # 固定前缀
spring:
  application:
    name: aio-life-serve
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    username: aio-life
    password: ${AIO_LIFE_DB_PASSWORD:root}
    url: jdbc:mysql://${AIO_LIFE_DB_URL:127.0.0.1:3306}/aio-life?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&autoReconnect=true&connectTimeout=10000&socketTimeout=30000
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # 连接池空闲检测，防止空闲连接被 MySQL 踢掉导致 Communications link failure
      test-while-idle: true
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 30000
      min-evictable-idle-time-millis: 180000
      max-evictable-idle-time-millis: 300000
      test-on-borrow: true
      test-on-return: false
      keep-alive: true
      initial-size: 5
      min-idle: 5
      max-active: 20

  mail:
    username: ${AIO_LIFE_MAIL_USERNAME:test@qq.com}
    password: ${AIO_LIFE_MAIL_PASSWORD:password}
    host: smtp.qq.com
    port: 465
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
          port: ${spring.mail.port}
          auth: true
          starttls:
            enable: true
            required: true
  data:
    redis:
      host: ${AIO_LIFE_REDIS_HOST:127.0.0.1}
      port: ${AIO_LIFE_REDIS_PORT:6379}
      password: ${AIO_LIFE_REDIS_PASSWORD:}

logging:
  level:
    top.aiolife.record.mapper: debug
    org.springframework.jdbc: debug
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%replace{%X{traceId}}{^(.{16}).*}{$1},%X{spanId}] [%thread] %-5level %logger{50} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%replace{%X{traceId}}{^(.{16}).*}{$1},%X{spanId}] [%thread] %-5level %logger{50} - %msg%n"

management:
  server:
    port: 45679 # 监控端点运行在独立端口，增强安全性
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true # 开启直方图，用于计算 P95/P99
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99 # 自动生成 50%, 90%, 95%, 99% 分位数指标
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: "health,info,prometheus" # 暴露 Prometheus 端点
  endpoint:
    prometheus:
      enabled: true
    health:
      enabled: true
      show-details: never
    info:
      enabled: true

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 2592000 # token有效期，单位秒 (30天)
  active-timeout: 604800 # 临时有效期 （一周），指定时间内无操作则失效，有操作自动续期
  is-concurrent: true # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
  is-share: false # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建token)
  jwt-secret-key: lys

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: is_deleted # 全局逻辑删除字段名
      logic-delete-value: 1 # 逻辑已删除值
      logic-not-delete-value: 0 # 逻辑未删除值

aio:
  life:
    serve:
      base-url: ${AIO_LIFE_SERVE_BASE_URL:http://localhost:45678/api}
      leetcode-corn: 0 30 23 * * ?
      auth:
        code:
          interval-seconds: 180 # 验证码发送间隔（秒），默认3分钟
          ip-limit-day: 100 # 单IP单日发送限制次数
          email-limit-day: 20 # 单邮箱单日发送限制次数
          total-limit-day: 1000 # 全局单日总发送限制次数
      minio:
        endpoint: ${MINIO_ENDPOINT:http://localhost:1300}
        access-key: ${MINIO_ACCESS_KEY:aio_life}
        secret-key: ${MINIO_SECRET_KEY:aio_life}
        bucket-name: ${MINIO_BUCKET_NAME:aiolife}
        image-prefix: ${MINIO_IMAGE_PREFIX:images/}
      mbti:
        api-key: ${AIO_LIFE_MBTI_API_KEY:ee1aee-d3178c-1f49b8-652d40}
        base-url: ${AIO_LIFE_MBTI_BASE_URL:https://api.devil.ai}
      cbti:
        enabled: ${AIO_LIFE_CBTI_ENABLED:true}
        init-on-startup: ${AIO_LIFE_CBTI_INIT_ON_STARTUP:true}
        bucket-name: ${AIO_LIFE_CBTI_BUCKET_NAME:}
        object-prefix: ${AIO_LIFE_CBTI_OBJECT_PREFIX:images/cbti/characters/}
        personalities-path: ${AIO_LIFE_CBTI_PERSONALITIES_PATH:}
        characters-dir: ${AIO_LIFE_CBTI_CHARACTERS_DIR:src/main/resources/cbti/characters}
