server:
  port: 0

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration
      - org.springframework.boot.autoconfigure.data.neo4j.Neo4jDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.neo4j.Neo4jRepositoriesAutoConfiguration
  mail:
    test-connection: false
  datasource:
    druid:
      initial-size: 0
      min-idle: 0
      max-wait: 5000

management:
  server:
    port: 0

aio:
  life:
    scheduling:
      enabled: false
    neo4j:
      enabled: false
    server:
      cbti:
        enabled: false
      minio:
        endpoint: http://127.0.0.1:1300
        access-key: test
        secret-key: test1234
        bucket-name: test
